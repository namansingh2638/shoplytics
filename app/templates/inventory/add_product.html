{% extends "base.html" %}
{% block title %}Add Product{% endblock %}
{% block content %}
  <div class="card" style="max-width:500px;">
    <h2>Add Product</h2><br>
    <form method="POST">
      <input type="text" name="name" placeholder="Product Name" required>
      <input type="text" name="barcode" placeholder="Barcode (optional)">
      <input type="number" step="0.01" name="cost_price" placeholder="Cost Price" required>
      <input type="number" step="0.01" name="selling_price" placeholder="Selling Price" required>
      <input type="number" name="stock_quantity" placeholder="Stock Quantity" required>
      <select name="category_id">
        <option value="">-- No Category --</option>
        {% for cat in categories %}
          <option value="{{ cat.id }}">{{ cat.name }}</option>
        {% endfor %}
      </select>
      <button class="btn btn-primary" type="submit">Add Product</button>
      <a class="btn" href="{{ url_for('inventory.index') }}">Cancel</a>
    </form>
  </div>
{% endblock %}
