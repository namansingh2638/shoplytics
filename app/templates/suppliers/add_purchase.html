{% extends "base.html" %}
{% block title %}Record Purchase{% endblock %}
{% block content %}
  <div class="card" style="max-width:500px;">
    <h2>Record Purchase</h2><br>
    <form method="POST">
      <select name="supplier_id" required>
        <option value="">-- Select Supplier --</option>
        {% for s in suppliers %}
          <option value="{{ s.id }}">{{ s.name }}</option>
        {% endfor %}
      </select>
      <select name="product_id" required>
        <option value="">-- Select Product --</option>
        {% for p in products %}
          <option value="{{ p.id }}">{{ p.name }} (Stock: {{ p.stock_quantity }})</option>
        {% endfor %}
      </select>
      <input type="number" name="quantity" placeholder="Quantity" required>
      <input type="number" step="0.01" name="cost_price" placeholder="Cost Price per unit" required>
      <button class="btn btn-primary" type="submit">Record Purchase</button>
      <a class="btn" href="{{ url_for('suppliers.purchases') }}">Cancel</a>
    </form>
  </div>
{% endblock %}
